# Codex MCP servers.
# Codex reads MCP config from your GLOBAL config: ~/.codex/config.toml.
# Merge these blocks into ~/.codex/config.toml. Keep versions pinned.

[mcp_servers.context7]
command = "pnpm"
args = ["dlx", "@upstash/context7-mcp@3.2.1"]

[mcp_servers.playwright]
command = "pnpm"
args = ["dlx", "@playwright/mcp@0.0.76"]
