name: Containers

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*.*.*"]

env:
  REGISTRY: ghcr.io

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - uses: astral-sh/setup-uv@v7
      - run: pnpm --dir apps/web install --frozen-lockfile
      - run: pnpm --dir apps/web audit --audit-level high
      - run: pnpm --dir apps/web lint
      - run: pnpm --dir apps/web typecheck
      - run: pnpm --dir apps/web test
      - run: pnpm --dir apps/web build
      - run: uv --directory apps/api sync --locked
      - run: uv --directory apps/api run ruff check .
      - run: uv --directory apps/api run pip-audit
      - run: uv --directory apps/api run pytest

  images:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      matrix:
        include:
          - target: web-runtime
            image: ${{ github.repository }}-web
          - target: api-runtime
            image: ${{ github.repository }}-api
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
      - if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
