services:
  api:
    image: node:22-bookworm-slim
    working_dir: /workspace
    command: sh -lc "corepack enable && pnpm install && pnpm --filter api dev"
    environment:
      NODE_ENV: development
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - pnpm-store:/pnpm/store
      - node-modules:/workspace/node_modules

  web:
    image: node:22-bookworm-slim
    working_dir: /workspace
    command: sh -lc "corepack enable && pnpm install && pnpm --filter web dev --host 0.0.0.0"
    environment:
      NODE_ENV: development
      API_URL: http://api:3000
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
      - pnpm-store:/pnpm/store
      - node-modules:/workspace/node_modules
    depends_on:
      - api

volumes:
  pnpm-store:
  node-modules:
